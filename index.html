<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MoMA Collection Explorer</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
  background: #fafafa;
  color: #1a1a1a;
  font-size: 13px;
  line-height: 1.4;
}

a { color: #0057b8; text-decoration: none; }
a:hover { color: #003d82; text-decoration: underline; }

:focus-visible { outline: 2px solid #0057b8; outline-offset: 1px; }

/* ── Header ── */
.header {
  height: 48px;
  background: #ffffff;
  border-bottom: 1px solid #e0e0e0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  position: sticky;
  top: 0;
  z-index: 100;
}

.header h1 {
  font-size: 20px;
  font-weight: 700;
}

.search-box {
  width: 300px;
  height: 30px;
  padding: 0 10px;
  border: 1px solid #e0e0e0;
  border-radius: 3px;
  font-size: 13px;
  font-family: inherit;
}

/* ── Layout ── */
.layout {
  display: flex;
  min-height: calc(100vh - 48px);
}

/* ── Sidebar ── */
.sidebar {
  width: 220px;
  min-width: 220px;
  background: #ffffff;
  border-right: 1px solid #e0e0e0;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 16px;
  overflow-y: auto;
  position: sticky;
  top: 48px;
  height: calc(100vh - 48px);
}

.filter-group label {
  display: block;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  color: #545454;
  margin-bottom: 4px;
  font-weight: 600;
}

.filter-group select {
  width: 100%;
  height: 28px;
  font-size: 12px;
  font-family: inherit;
  border: 1px solid #e0e0e0;
  border-radius: 3px;
  background: #fff;
}

.year-range {
  display: flex;
  align-items: center;
  gap: 6px;
}

.year-range input {
  width: 100%;
  height: 28px;
  font-size: 12px;
  font-family: inherit;
  border: 1px solid #e0e0e0;
  border-radius: 3px;
  padding: 0 6px;
}

.year-range span {
  color: #545454;
}

/* ── Main ── */
.main {
  flex: 1;
  padding: 16px 20px;
  min-width: 0;
  display: flex;
  flex-direction: column;
}

.result-count {
  font-size: 13px;
  color: #545454;
  margin-bottom: 10px;
}

/* ── Table ── */
.table-wrap {
  flex: 1;
  overflow-x: auto;
}

table {
  width: 100%;
  border-collapse: collapse;
  table-layout: fixed;
}

thead th {
  position: sticky;
  top: 0;
  background: #ffffff;
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: #545454;
  font-weight: 600;
  text-align: left;
  padding: 8px 8px;
  border-bottom: 2px solid #e0e0e0;
  cursor: pointer;
  user-select: none;
  white-space: nowrap;
}

thead th:hover { color: #1a1a1a; }

thead th.col-title { width: 26%; }
thead th.col-artist { width: 16%; }
thead th.col-date { width: 70px; text-align: right; }
thead th.col-medium { width: 20%; }
thead th.col-classification { width: 12%; }
thead th.col-nationality { width: 10%; }
thead th.col-acquired { width: 10%; }

tbody tr {
  height: 32px;
  cursor: pointer;
  border-bottom: 1px solid #e0e0e0;
}

tbody tr:hover { background: #e8eff7; }

td {
  padding: 4px 8px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

td.col-date { text-align: right; }

td.col-title a { color: #0057b8; text-decoration: none; }
td.col-title a:hover { text-decoration: underline; }

/* ── Pagination ── */
.pagination {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 12px;
  flex-wrap: wrap;
  gap: 8px;
}

.page-controls {
  display: flex;
  align-items: center;
  gap: 4px;
}

.page-controls button, .page-controls span {
  font-family: inherit;
  font-size: 13px;
  padding: 4px 8px;
  border: none;
  background: none;
  cursor: pointer;
  color: #1a1a1a;
  border-radius: 3px;
}

.page-controls button:hover:not(:disabled) { background: #e8eff7; }
.page-controls button:disabled { color: #8c8c8c; cursor: default; }

.page-controls .current-page {
  font-weight: 700;
  color: #0057b8;
  border-bottom: 2px solid #0057b8;
  border-radius: 0;
}

.page-controls .ellipsis { cursor: default; color: #545454; }

.page-size-controls {
  display: flex;
  align-items: center;
  gap: 4px;
  font-size: 13px;
  color: #545454;
}

.page-size-controls button {
  font-family: inherit;
  font-size: 13px;
  border: none;
  background: none;
  cursor: pointer;
  padding: 4px 6px;
  color: #545454;
  border-radius: 3px;
}

.page-size-controls button:hover { background: #e8eff7; }
.page-size-controls button.active { font-weight: 700; color: #0057b8; }

/* ── Loading ── */
.loading-overlay {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 60vh;
}

.spinner {
  width: 36px;
  height: 36px;
  border: 3px solid #e0e0e0;
  border-top-color: #0057b8;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

.loading-overlay p {
  margin-top: 12px;
  color: #545454;
  font-size: 14px;
}

/* ── Modal ── */
.modal-backdrop {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.4);
  z-index: 200;
  justify-content: center;
  align-items: center;
}

.modal-backdrop.open { display: flex; }

.modal {
  background: #ffffff;
  max-width: 640px;
  width: 90%;
  max-height: 80vh;
  border-radius: 4px;
  padding: 24px;
  position: relative;
  display: flex;
  flex-direction: column;
}

.modal-close {
  position: sticky;
  top: 0;
  align-self: flex-end;
  width: 32px;
  height: 32px;
  border: none;
  background: none;
  font-size: 20px;
  cursor: pointer;
  color: #545454;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 3px;
  flex-shrink: 0;
}

.modal-close:hover { background: #e8eff7; color: #1a1a1a; }

.modal-body {
  overflow-y: auto;
  flex: 1;
}

.modal-image {
  text-align: center;
  margin-bottom: 16px;
}

.modal-image img {
  max-height: 300px;
  max-width: 100%;
  border: 1px solid #e0e0e0;
}

.modal-fields {
  display: grid;
  grid-template-columns: 120px 1fr;
  gap: 6px 12px;
}

.modal-fields dt {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  color: #545454;
  font-weight: 600;
  padding-top: 2px;
}

.modal-fields dd {
  font-size: 14px;
  word-break: break-word;
}

.modal-link {
  display: inline-block;
  margin-top: 16px;
  padding: 8px 16px;
  background: #0057b8;
  color: #fff;
  border-radius: 3px;
  font-size: 13px;
  text-align: center;
}

.modal-link:hover { background: #003d82; color: #fff; text-decoration: none; }
</style>
</head>
<body>

<header class="header">
  <h1>MoMA Collection Explorer</h1>
  <input type="search" class="search-box" id="searchInput" placeholder="Search title, artist, medium…">
</header>

<div class="layout">
  <aside class="sidebar" id="sidebar">
    <div class="filter-group">
      <label for="filterClassification">Classification</label>
      <select id="filterClassification"><option value="">All</option></select>
    </div>
    <div class="filter-group">
      <label for="filterDepartment">Department</label>
      <select id="filterDepartment"><option value="">All</option></select>
    </div>
    <div class="filter-group">
      <label for="filterNationality">Nationality</label>
      <select id="filterNationality"><option value="">All</option></select>
    </div>
    <div class="filter-group">
      <label for="filterGender">Gender</label>
      <select id="filterGender">
        <option value="">All</option>
        <option value="male">Male</option>
        <option value="female">Female</option>
        <option value="mixed">Mixed</option>
        <option value="unknown">Unknown</option>
      </select>
    </div>
    <div class="filter-group">
      <label>Year Range</label>
      <div class="year-range">
        <input type="number" id="yearFrom" placeholder="From">
        <span>&ndash;</span>
        <input type="number" id="yearTo" placeholder="To">
      </div>
    </div>
  </aside>

  <main class="main">
    <div class="loading-overlay" id="loading">
      <div class="spinner"></div>
      <p>Loading artworks…</p>
    </div>

    <div id="content" style="display:none;">
      <div class="result-count" id="resultCount"></div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr id="tableHead">
              <th class="col-title" data-key="Title">Title</th>
              <th class="col-artist" data-key="Artist">Artist</th>
              <th class="col-date" data-key="_year">Date</th>
              <th class="col-medium" data-key="Medium">Medium</th>
              <th class="col-classification" data-key="Classification">Classification</th>
              <th class="col-nationality" data-key="_nationalityDisplay">Nationality</th>
              <th class="col-acquired" data-key="DateAcquired">Acquired</th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
      <div class="pagination">
        <div class="page-controls" id="pageControls"></div>
        <div class="page-size-controls">
          <span>Per page:</span>
          <button data-size="25">25</button>
          <button data-size="50" class="active">50</button>
          <button data-size="100">100</button>
        </div>
      </div>
    </div>
  </main>
</div>

<div class="modal-backdrop" id="modalBackdrop">
  <div class="modal" id="modal">
    <button class="modal-close" id="modalClose">&times;</button>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<script>
(function () {
  'use strict';

  /* ── State ── */
  let allRows = [];
  let filtered = [];
  let currentPage = 1;
  let pageSize = 50;
  let sortKey = null;
  let sortAsc = true;
  let searchTerm = '';
  let filters = { Classification: '', Department: '', Nationality: '', Gender: '' };
  let yearFrom = null;
  let yearTo = null;

  /* ── DOM refs ── */
  const $ = (id) => document.getElementById(id);
  const loadingEl = $('loading');
  const contentEl = $('content');
  const resultCountEl = $('resultCount');
  const tableBody = $('tableBody');
  const tableHead = $('tableHead');
  const pageControls = $('pageControls');
  const searchInput = $('searchInput');
  const modalBackdrop = $('modalBackdrop');
  const modalBody = $('modalBody');

  /* ── CSV Parser ── */
  function parseCSV(text) {
    // Strip BOM
    if (text.charCodeAt(0) === 0xFEFF) text = text.slice(1);

    const rows = [];
    const len = text.length;
    let i = 0;
    let row = [];
    let field = '';
    let inQuotes = false;

    while (i < len) {
      const ch = text[i];
      if (inQuotes) {
        if (ch === '"') {
          if (i + 1 < len && text[i + 1] === '"') {
            field += '"';
            i += 2;
          } else {
            inQuotes = false;
            i++;
          }
        } else {
          field += ch;
          i++;
        }
      } else {
        if (ch === '"') {
          inQuotes = true;
          i++;
        } else if (ch === ',') {
          row.push(field);
          field = '';
          i++;
        } else if (ch === '\n' || ch === '\r') {
          row.push(field);
          field = '';
          if (ch === '\r' && i + 1 < len && text[i + 1] === '\n') i++;
          i++;
          if (row.length > 1 || (row.length === 1 && row[0] !== '')) rows.push(row);
          row = [];
        } else {
          field += ch;
          i++;
        }
      }
    }
    // Last field
    if (field || row.length > 0) {
      row.push(field);
      if (row.length > 1 || (row.length === 1 && row[0] !== '')) rows.push(row);
    }
    return rows;
  }

  function csvToObjects(text) {
    const parsed = parseCSV(text);
    if (parsed.length === 0) return [];
    const headers = parsed[0];
    const data = [];
    for (let r = 1; r < parsed.length; r++) {
      const obj = {};
      for (let c = 0; c < headers.length; c++) {
        obj[headers[c]] = (parsed[r][c] || '').trim();
      }
      data.push(obj);
    }
    return data;
  }

  /* ── Data helpers ── */
  function extractYear(dateStr) {
    if (!dateStr) return null;
    const m = dateStr.match(/\d{4}/);
    return m ? parseInt(m[0], 10) : null;
  }

  function parseNationalities(raw) {
    if (!raw || raw === '()') return [];
    // Split on ') (' to separate multi-artist entries, then strip remaining parens
    return raw.split(') (').map(s => s.replace(/[()]/g, '').trim()).filter(Boolean);
  }

  function preprocessRow(row) {
    row._year = extractYear(row.Date);
    row._nationalities = parseNationalities(row.Nationality);
    row._nationalityDisplay = row._nationalities.join(', ');
    row._searchText = (
      (row.Title || '') + ' ' + (row.Artist || '') + ' ' + (row.Medium || '')
    ).toLowerCase();
    return row;
  }

  /* ── Filter population ── */
  function populateFilters() {
    const classSet = {};
    const deptSet = {};
    const natCount = {};

    for (const row of allRows) {
      if (row.Classification) classSet[row.Classification] = (classSet[row.Classification] || 0) + 1;
      if (row.Department) deptSet[row.Department] = (deptSet[row.Department] || 0) + 1;
      for (const n of row._nationalities) {
        natCount[n] = (natCount[n] || 0) + 1;
      }
    }

    fillSelect('filterClassification', Object.keys(classSet).sort());
    fillSelect('filterDepartment', Object.keys(deptSet).sort());

    // Top 30 nationalities + Other
    const natSorted = Object.entries(natCount).sort((a, b) => b[1] - a[1]);
    const top30 = natSorted.slice(0, 30).map(e => e[0]);
    const natOptions = [...top30];
    if (natSorted.length > 30) natOptions.push('Other');
    fillSelect('filterNationality', natOptions);

    // Store for "Other" matching
    window._top30Nationalities = new Set(top30);
  }

  function fillSelect(id, values) {
    const sel = $(id);
    for (const v of values) {
      const opt = document.createElement('option');
      opt.value = v;
      opt.textContent = v;
      sel.appendChild(opt);
    }
  }

  /* ── Filtering ── */
  function applyFilters() {
    const term = searchTerm;
    const fClass = filters.Classification;
    const fDept = filters.Department;
    const fNat = filters.Nationality;
    const fGender = filters.Gender;
    const yf = yearFrom;
    const yt = yearTo;
    const hasDateFilter = yf !== null || yt !== null;

    filtered = allRows.filter(row => {
      if (term && row._searchText.indexOf(term) === -1) return false;
      if (fClass && row.Classification !== fClass) return false;
      if (fDept && row.Department !== fDept) return false;

      if (fNat) {
        const nats = row._nationalities;
        if (fNat === 'Other') {
          if (nats.length === 0) return false;
          if (nats.every(n => window._top30Nationalities.has(n))) return false;
        } else {
          if (!nats.includes(fNat)) return false;
        }
      }

      if (fGender) {
        const g = (row.Gender || '');
        const hasMale = g.includes('(male)');
        const hasFemale = g.includes('(female)');
        if (fGender === 'male') { if (!hasMale || hasFemale) return false; }
        else if (fGender === 'female') { if (!hasFemale || hasMale) return false; }
        else if (fGender === 'mixed') { if (!(hasMale && hasFemale)) return false; }
        else if (fGender === 'unknown') { if (hasMale || hasFemale) return false; }
      }

      if (hasDateFilter) {
        if (row._year === null) return false;
        if (yf !== null && row._year < yf) return false;
        if (yt !== null && row._year > yt) return false;
      }

      return true;
    });

    if (sortKey) doSort();
    currentPage = 1;
    render();
  }

  /* ── Sorting ── */
  function doSort() {
    const key = sortKey;
    const asc = sortAsc;
    filtered.sort((a, b) => {
      let va = a[key], vb = b[key];
      if (key === '_year') {
        va = va === null ? (asc ? Infinity : -Infinity) : va;
        vb = vb === null ? (asc ? Infinity : -Infinity) : vb;
        return asc ? va - vb : vb - va;
      }
      va = (va || '').toLowerCase();
      vb = (vb || '').toLowerCase();
      if (va < vb) return asc ? -1 : 1;
      if (va > vb) return asc ? 1 : -1;
      return 0;
    });
  }

  /* ── Render ── */
  function render() {
    const total = filtered.length;
    const totalPages = Math.max(1, Math.ceil(total / pageSize));
    if (currentPage > totalPages) currentPage = totalPages;

    resultCountEl.textContent = 'Showing ' + total.toLocaleString() + ' artworks';

    // Table rows
    const start = (currentPage - 1) * pageSize;
    const pageRows = filtered.slice(start, start + pageSize);

    const fragments = [];
    for (const row of pageRows) {
      const titleCell = row.URL
        ? '<a href="' + escAttr(row.URL) + '" target="_blank" rel="noopener" onclick="event.stopPropagation()">' + esc(row.Title || '—') + '</a>'
        : esc(row.Title || '—');

      fragments.push(
        '<tr data-idx="' + row._idx + '">' +
        '<td class="col-title" title="' + escAttr(row.Title) + '">' + titleCell + '</td>' +
        '<td title="' + escAttr(row.Artist) + '">' + esc(row.Artist || '') + '</td>' +
        '<td class="col-date">' + esc(row.Date || '') + '</td>' +
        '<td title="' + escAttr(row.Medium) + '">' + esc(row.Medium || '') + '</td>' +
        '<td>' + esc(row.Classification || '') + '</td>' +
        '<td title="' + escAttr(row._nationalityDisplay) + '">' + esc(row._nationalityDisplay || '') + '</td>' +
        '<td>' + esc(row.DateAcquired || '') + '</td>' +
        '</tr>'
      );
    }
    tableBody.innerHTML = fragments.join('');

    // Pagination
    renderPagination(totalPages);

    // Sort indicators
    for (const th of tableHead.children) {
      const key = th.dataset.key;
      const base = th.textContent.replace(/ [▲▼]$/, '');
      th.textContent = key === sortKey ? base + (sortAsc ? ' ▲' : ' ▼') : base;
    }
  }

  function renderPagination(totalPages) {
    const pages = buildPageNumbers(currentPage, totalPages);
    let html = '<button ' + (currentPage <= 1 ? 'disabled' : '') + ' data-page="prev">◀ Prev</button>';
    for (const p of pages) {
      if (p === '…') {
        html += '<span class="ellipsis">…</span>';
      } else if (p === currentPage) {
        html += '<span class="current-page">' + p + '</span>';
      } else {
        html += '<button data-page="' + p + '">' + p + '</button>';
      }
    }
    html += '<button ' + (currentPage >= totalPages ? 'disabled' : '') + ' data-page="next">Next ▶</button>';
    html += '<span style="margin-left:8px;color:#545454;">Page ' + currentPage + ' of ' + totalPages.toLocaleString() + '</span>';
    pageControls.innerHTML = html;
  }

  function buildPageNumbers(current, total) {
    if (total <= 7) return Array.from({ length: total }, (_, i) => i + 1);
    const pages = [];
    const near = new Set([1, total, current, current - 1, current + 1]);
    let last = 0;
    for (let i = 1; i <= total; i++) {
      if (near.has(i)) {
        if (last && i - last > 1) pages.push('…');
        pages.push(i);
        last = i;
      }
    }
    return pages;
  }

  /* ── Escape helpers ── */
  function esc(s) {
    return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  function escAttr(s) {
    return (s || '').replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  /* ── Detail Modal ── */
  const displayFields = [
    'Title', 'Artist', 'ArtistBio', 'Nationality', 'BeginDate', 'EndDate', 'Gender',
    'Date', 'Medium', 'Dimensions', 'Classification', 'Department',
    'CreditLine', 'AccessionNumber', 'DateAcquired', 'Cataloged', 'OnView',
    'ObjectID', 'Height (cm)', 'Width (cm)', 'Depth (cm)', 'Diameter (cm)', 'Duration (sec.)'
  ];

  function openModal(row) {
    let html = '';

    if (row.ImageURL) {
      html += '<div class="modal-image"><img src="' + escAttr(row.ImageURL) + '" alt="' + escAttr(row.Title) + '" onerror="this.parentElement.style.display=\'none\'"></div>';
    }

    html += '<dl class="modal-fields">';
    for (const key of displayFields) {
      let val = row[key];
      if (!val || val === '') continue;
      // Clean parens from Nationality/Gender
      if (key === 'Nationality' || key === 'Gender') val = val.replace(/[()]/g, '').trim();
      if (key === 'BeginDate' || key === 'EndDate') {
        val = val.replace(/[()]/g, '').trim();
        if (!val || val === '0') continue;
      }
      html += '<dt>' + esc(key) + '</dt><dd>' + esc(val) + '</dd>';
    }
    html += '</dl>';

    if (row.URL) {
      html += '<a class="modal-link" href="' + escAttr(row.URL) + '" target="_blank" rel="noopener">View on MoMA</a>';
    }

    modalBody.innerHTML = html;
    modalBackdrop.classList.add('open');
  }

  function closeModal() {
    modalBackdrop.classList.remove('open');
  }

  /* ── Events ── */
  // Search
  let searchTimer;
  searchInput.addEventListener('input', () => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => {
      searchTerm = searchInput.value.trim().toLowerCase();
      applyFilters();
    }, 300);
  });

  // Filters
  for (const id of ['filterClassification', 'filterDepartment', 'filterNationality', 'filterGender']) {
    $(id).addEventListener('change', () => {
      filters[id.replace('filter', '')] = $(id).value;
      applyFilters();
    });
  }

  // Year range
  $('yearFrom').addEventListener('input', () => {
    const v = $('yearFrom').value.trim();
    yearFrom = v ? parseInt(v, 10) : null;
    applyFilters();
  });

  $('yearTo').addEventListener('input', () => {
    const v = $('yearTo').value.trim();
    yearTo = v ? parseInt(v, 10) : null;
    applyFilters();
  });

  // Sort
  tableHead.addEventListener('click', (e) => {
    const th = e.target.closest('th');
    if (!th || !th.dataset.key) return;
    const key = th.dataset.key;
    if (sortKey === key) {
      sortAsc = !sortAsc;
    } else {
      sortKey = key;
      sortAsc = true;
    }
    doSort();
    render();
  });

  // Pagination
  pageControls.addEventListener('click', (e) => {
    const btn = e.target.closest('button');
    if (!btn || btn.disabled) return;
    const p = btn.dataset.page;
    const totalPages = Math.max(1, Math.ceil(filtered.length / pageSize));
    if (p === 'prev') currentPage = Math.max(1, currentPage - 1);
    else if (p === 'next') currentPage = Math.min(totalPages, currentPage + 1);
    else currentPage = parseInt(p, 10);
    render();
    document.querySelector('.table-wrap').scrollTop = 0;
  });

  // Page size
  document.querySelector('.page-size-controls').addEventListener('click', (e) => {
    const btn = e.target.closest('button[data-size]');
    if (!btn) return;
    pageSize = parseInt(btn.dataset.size, 10);
    currentPage = 1;
    document.querySelectorAll('.page-size-controls button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  });

  // Row click -> modal
  tableBody.addEventListener('click', (e) => {
    const tr = e.target.closest('tr');
    if (!tr || e.target.tagName === 'A') return;
    const idx = parseInt(tr.dataset.idx, 10);
    openModal(allRows[idx]);
  });

  // Modal close
  $('modalClose').addEventListener('click', closeModal);
  modalBackdrop.addEventListener('click', (e) => {
    if (e.target === modalBackdrop) closeModal();
  });
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closeModal();
  });

  /* ── Load data ── */
  fetch('Data/Artworks.csv')
    .then(r => r.text())
    .then(text => {
      allRows = csvToObjects(text);
      for (let i = 0; i < allRows.length; i++) {
        allRows[i]._idx = i;
        preprocessRow(allRows[i]);
      }
      populateFilters();
      filtered = allRows.slice();
      loadingEl.style.display = 'none';
      contentEl.style.display = '';
      render();
    })
    .catch(err => {
      loadingEl.innerHTML = '<p style="color:#c00;">Failed to load Artworks.csv: ' + esc(err.message) + '</p>';
    });
})();
</script>
</body>
</html>
